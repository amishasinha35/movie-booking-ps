spring.application.name=movie-booking-ps

# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/moviebookingdb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=create
# TODO: switch ddl-auto to validate and add Flyway migrations before deploying to any shared environment
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Seed data runs after schema is created
spring.sql.init.mode=always
# Ensures Hibernate creates schema before data.sql runs
spring.jpa.defer-datasource-initialization=true

# JWT — change secret before any real deployment
jwt.secret=movie-booking-ps-jwt-secret-key-at-least-32-chars
jwt.expiry-ms=86400000

# Server
server.port=8080

# Swagger
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
